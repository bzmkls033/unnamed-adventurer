<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>不知名冒险家</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- 主页 -->
  <div id="screen-home" class="screen active">
    <div class="home-container">
      <div class="game-logo">
        <h1>🎲 不知名冒险家</h1>
        <p class="subtitle">多人联机回合制冒险桌游</p>
      </div>
      <div class="home-actions">
        <input type="text" id="playerName" placeholder="输入你的名字" maxlength="8">
        <button id="btn-create" class="btn btn-primary">创建房间</button>
        <div style="display:flex;gap:10px;width:100%">
          <input type="text" id="roomCodeInput" placeholder="输入房间号" maxlength="6" style="flex:1;height:52px;font-size:20px;padding:14px 18px;background:#0d1729;color:#fff;border:2px solid rgba(255,255,255,0.25);border-radius:12px;outline:none;text-align:center;letter-spacing:6px;display:block;min-width:0;">
          <button id="btn-join" class="btn btn-secondary" style="height:52px;min-width:80px;flex-shrink:0;">加入</button>
        </div>
      </div>
      <div class="home-features">
        <span>🗺️ 地图探索</span><span>👹 Boss挑战</span><span>💎 藏品收集</span><span>🤝 实时交易</span>
      </div>
    </div>
  </div>

  <!-- 大厅 -->
  <div id="screen-lobby" class="screen">
    <div class="lobby-container">
      <h2>房间: <span id="lobby-code" class="room-code"></span></h2>
      <div id="lobby-players" class="player-list"></div>
      <div class="lobby-actions">
        <button id="btn-ready" class="btn btn-secondary">准备</button>
        <button id="btn-start" class="btn btn-primary" style="display:none">开始游戏</button>
        <button id="btn-leave" class="btn btn-danger">离开房间</button>
      </div>
      <p class="lobby-hint">将房间号发给好友，等待加入... (至少2人)</p>
    </div>
  </div>

  <!-- 游戏主界面 -->
  <div id="screen-game" class="screen">
    <div class="game-layout">
      <!-- 顶部信息栏 -->
      <div class="game-header">
        <div class="header-left">
          <span id="world-rule" class="world-rule"></span>
          <span id="timer" class="timer">30:00</span>
        </div>
        <div class="header-right">
          <span id="turn-info" class="turn-info"></span>
          <span id="phase-info" class="phase-info"></span>
        </div>
      </div>

      <!-- 主区域 -->
      <div class="game-main">
        <!-- 左侧：玩家状态 -->
        <div class="sidebar left-sidebar" id="player-panel"></div>

        <!-- 中间：游戏地图 -->
        <div class="board-area">
          <div id="game-board" class="game-board"></div>
          <div id="action-bar" class="action-bar">
            <button id="btn-roll" class="btn btn-action" disabled>🎲 掷骰子</button>
            <button id="btn-use-item" class="btn btn-action" disabled>🎒 使用道具</button>
            <button id="btn-trigger" class="btn btn-action" disabled>⚡ 触发事件</button>
            <button id="btn-end-turn" class="btn btn-action" disabled>⏭ 结束回合</button>
            <button id="btn-shop" class="btn btn-action">🏪 商店</button>
            <button id="btn-trade" class="btn btn-action">🤝 交易</button>
            <button id="btn-surrender" class="btn btn-danger">🏳️ 投降</button>
          </div>
        </div>

        <!-- 右侧：日志 -->
        <div class="sidebar right-sidebar">
          <h3>📜 事件日志</h3>
          <div id="game-log" class="game-log"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 弹窗：事件选择 -->
  <div id="modal-event" class="modal">
    <div class="modal-content">
      <h3 id="event-title"></h3>
      <p id="event-desc"></p>
      <div id="event-choices" class="event-choices"></div>
    </div>
  </div>

  <!-- 弹窗：商店 -->
  <div id="modal-shop" class="modal">
    <div class="modal-content modal-wide">
      <h3>🏪 世界商店</h3>
      <div id="shop-items" class="shop-grid"></div>
      <button class="btn btn-secondary modal-close" onclick="closeModal('modal-shop')">关闭</button>
    </div>
  </div>

  <!-- 弹窗：道具背包 -->
  <div id="modal-inventory" class="modal">
    <div class="modal-content modal-wide">
      <h3>🎒 背包</h3>
      <div id="inventory-items" class="inventory-grid"></div>
      <button class="btn btn-secondary modal-close" onclick="closeModal('modal-inventory')">关闭</button>
    </div>
  </div>

  <!-- 弹窗：交易 -->
  <div id="modal-trade" class="modal">
    <div class="modal-content modal-wide">
      <h3>🤝 交易</h3>
      <div class="trade-form">
        <div class="trade-section">
          <label>选择交易对象:</label>
          <select id="trade-target"></select>
        </div>
        <div class="trade-section">
          <label>你给出:</label>
          <input type="number" id="trade-offer-gold" placeholder="金币" min="0">
        </div>
        <div class="trade-section">
          <label>你索要:</label>
          <input type="number" id="trade-request-gold" placeholder="金币" min="0">
        </div>
        <button id="btn-confirm-trade" class="btn btn-primary">发起交易</button>
      </div>
      <button class="btn btn-secondary modal-close" onclick="closeModal('modal-trade')">关闭</button>
    </div>
  </div>

  <!-- 弹窗：Boss战斗 -->
  <div id="modal-boss" class="modal">
    <div class="modal-content">
      <h3 id="boss-name"></h3>
      <p id="boss-desc"></p>
      <div id="boss-hp" class="boss-hp-bar"></div>
      <div id="boss-actions" class="boss-actions"></div>
      <button class="btn btn-secondary modal-close" onclick="closeBossModal()">离开</button>
    </div>
  </div>

  <!-- 弹窗：小游戏 -->
  <div id="modal-minigame" class="modal">
    <div class="modal-content">
      <h3 id="minigame-name"></h3>
      <div id="minigame-content"></div>
    </div>
  </div>

  <!-- 弹窗：游戏结束 -->
  <div id="modal-gameover" class="modal">
    <div class="modal-content">
      <h2 id="gameover-title">🏆 游戏结束</h2>
      <p id="gameover-winner"></p>
      <button class="btn btn-primary" onclick="location.reload()">返回大厅</button>
    </div>
  </div>

  <!-- 提示信息 -->
  <div id="toast-container" class="toast-container"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
